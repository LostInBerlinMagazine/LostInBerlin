<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LostinBerlin - This is Berlin!</title>
</head>
<body>
    <h1>LostInBerlin</h1>
    <div id="rss-feed">Loading links...</div>

    <script>
        // Usiamo un proxy diverso per evitare i blocchi di rss2json
        const RSS_URL = 'https://lostinberlin.com/feed';
        const API_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(RSS_URL)}`;

        fetch(API_URL)
            .then(response => {
                if (response.ok) return response.json();
                throw new Error('Network response was not ok.');
            })
            .then(data => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                let html = '<ul>';
                
                // Prendiamo i primi 100 articoli direttamente dal tuo XML
                items.forEach((item, index) => {
                    if (index < 100) {
                        const title = item.querySelector("title").textContent;
                        const link = item.querySelector("link").textContent;
                        html += `<li><a href="${link}">${title}</a></li>`;
                    }
                });
                
                html += '</ul>';
                document.getElementById('rss-feed').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('rss-feed').innerHTML = "Errore di connessione. Riprova tra un istante.";
                console.error(err);
            });
    </script>
</body>
</html>
