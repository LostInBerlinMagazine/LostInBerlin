<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LostInBerlin - This is Berlin!</title>
</head>
<body>

<h1>LostInBerlin</h1>
<ul id="feed">Loading...</ul>

<script>
(async function () {
  try {
    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://www.lostinberlin.com/feed/"));
    const text = await res.text();

    const xml = new DOMParser().parseFromString(text, "text/xml");
    const items = xml.getElementsByTagName("item");

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    for (let i = 0; i < items.length; i++) {
      const title = items[i].getElementsByTagName("title")[0]?.textContent;
      const link = items[i].getElementsByTagName("link")[0]?.textContent;

      // immagine (RankMath / WordPress)
      const img =
        items[i].getElementsByTagName("image:loc")[0]?.textContent;

      const li = document.createElement("li");

      li.innerHTML = `
        ${img ? `<img src="${img}" width="120"><br>` : ""}
        <a href="${link}" target="_blank">${title}</a>
      `;

      feed.appendChild(li);
    }

  } catch (e) {
    document.getElementById("feed").innerHTML =
      "<li>Error loading</li>";
    console.log(e);
  }
})();
</script>

</body>
</html>
