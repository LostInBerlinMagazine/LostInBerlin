<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LostInBerlin - This is Berlin!</title>
</head>
<body>

<h1>LostInBerlin</h1>

<ul id="list">Loading...</ul>

<script>
(async function () {
  try {
    const res = await fetch("https://www.lostinberlin.com/post-sitemap.xml");
    const text = await res.text();

    const xml = new DOMParser().parseFromString(text, "text/xml");

    // prende SOLO i tag <loc>, ignorando tutto il resto
    const locs = xml.getElementsByTagName("loc");

    const list = document.getElementById("list");
    list.innerHTML = "";

    for (let i = 0; i < locs.length; i++) {
      const url = locs[i].textContent;

      const li = document.createElement("li");
      li.innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
      list.appendChild(li);
    }

  } catch (e) {
    document.getElementById("list").innerHTML =
      "<li>Error loading</li>";
  }
})();
</script>

</body>
</html>
