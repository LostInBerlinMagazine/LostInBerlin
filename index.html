<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LostinBerlin - This is Berlin!</title>
</head>
<body>
    <h1>LostInBerlin</h1>
    <div id="rss-feed">Loading links...</div>

    <script>
        const RSS_URL = 'https://www.lostinberlin.com/feed/';
        // Usiamo un servizio alternativo per convertire l'XML in JSON
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}&count=100&api_key=4p3o6o0o6o0o6o0o6o0o6o0o6o0o6o0o`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'ok') {
                    let html = '<ul>';
                    data.items.forEach(item => {
                        html += `<li><a href="${item.link}">${item.title}</a></li>`;
                    });
                    html += '</ul>';
                    document.getElementById('rss-feed').innerHTML = html;
                } else {
                    document.getElementById('rss-feed').innerHTML = "Il server è sovraccarico, ricarica tra 10 secondi.";
                }
            })
            .catch(err => {
                document.getElementById('rss-feed').innerHTML = "Riprova ricaricando la pagina.";
            });
    </script>
</body>
</html>
