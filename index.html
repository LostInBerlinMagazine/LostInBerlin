<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LostInBerlin Sitemap</title>
</head>
<body>

<h1>LostInBerlin</h1>

<ul id="list">Loading...</ul>

<script>
(async function () {
  try {
    const proxyUrl = "https://api.allorigins.win/raw?url=";
    const target = encodeURIComponent("https://www.lostinberlin.com/post-sitemap.xml");

    const res = await fetch(proxyUrl + target);
    const text = await res.text();

    const xml = new DOMParser().parseFromString(text, "text/xml");
    const locs = xml.getElementsByTagName("loc");

    const list = document.getElementById("list");
    list.innerHTML = "";

    if (!locs.length) {
      list.innerHTML = "<li>No URLs found</li>";
      return;
    }

    for (let i = 0; i < locs.length; i++) {
      const url = locs[i].textContent;

      const li = document.createElement("li");
      li.innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
      list.appendChild(li);
    }

  } catch (e) {
    document.getElementById("list").innerHTML =
      "<li>Error loading (blocked or proxy down)</li>";
    console.log(e);
  }
})();
</script>

</body>
</html>
