<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LostInBerlin - This is Berlin</title>
</head>
<body>

<h1>LostInBerlin</h1>
<ul id="feed"></ul>

<script>
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://lostinberlin.com/feed/")
  .then(res => res.json())
  .then(data => {
    const feed = document.getElementById("feed");
    data.items.slice(0,10).forEach(item => {
      const li = document.createElement("li");
      li.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a>`;
      feed.appendChild(li);
    });
  });
</script>

</body>
</html>
