<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LostInBerlin Feed</title>
</head>
<body>

<h1>LostInBerlin</h1>

<ul id="feed">Loading...</ul>

<script>
(async function () {
  try {
    const proxy = "https://api.allorigins.win/get?url=";
    const target = encodeURIComponent("https://lostinberlin.com/feed/");

    const response = await fetch(proxy + target);
    const data = await response.json();

    const xml = new DOMParser().parseFromString(data.contents, "text/xml");
    const items = xml.getElementsByTagName("item");

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    if (!items.length) {
      feed.innerHTML = "<li>No articles found (feed blocked or empty)</li>";
      return;
    }

    for (let i = 0; i < items.length; i++) {
      const title = items[i].getElementsByTagName("title")[0]?.textContent;
      const link = items[i].getElementsByTagName("link")[0]?.textContent;

      if (!title || !link) continue;

      const li = document.createElement("li");
      li.innerHTML = `<a href="${link}" target="_blank">${title}</a>`;
      feed.appendChild(li);
    }

  } catch (e) {
    document.getElementById("feed").innerHTML =
      "<li>Feed error (proxy or CORS blocked)</li>";
    console.error(e);
  }
})();
</script>

</body>
</html>
