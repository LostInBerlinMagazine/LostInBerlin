<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LostInBerlin - This is Berlin</title>
</head>
<body>
    <h1>lostInBerlin</h1>
    <div id="rss-feed"></div>

    <script>
        const RSS_URL = `https://www.lostinberlin.com/feed/`;
        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`)
            .then(response => response.json())
            .then(data => {
                let html = '<ul>';
                data.items.forEach(item => {
                    html += `<li><a href="${item.link}">${item.title}</a></li>`;
                });
                html += '</ul>';
                document.getElementById('rss-feed').innerHTML = html;
            });
    </script>
</body>
</html>
