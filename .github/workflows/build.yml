name: Build RSS Feed Page

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download feed
        run: curl -L https://www.lostinberlin.com/feed/ -o feed.xml

      - name: Build HTML (simple reliable)
        run: |
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>LostInBerlin</title></head><body><h1>LostInBerlin</h1><ul>' > index.html

          awk '
          BEGIN { RS="</item>"; FS="\n" }
          /<item>/ {
            title=""
            link=""
            img=""

            for (i=1; i<=NF; i++) {
              if ($i ~ /<title>/) {
                gsub(/.*<title><!\[CDATA\[|]]><\/title>.*/, "", $i)
                if ($i != "") title=$i
              }

              if ($i ~ /<link>/ && link=="") {
                gsub(/.*<link>|<\/link>.*/, "", $i)
                link=$i
              }

              if ($i ~ /<img.*src=/ && img=="") {
                match($i, /src="([^"]+)"/, a)
                img=a[1]
              }
            }

            if (title != "" && link != "") {
              print "<li>"
              if (img != "") print "<img src=\"" img "\" width=\"120\"><br>"
              print "<a href=\"" link "\" target=\"_blank\">" title "</a></li>"
            }
          }' feed.xml >> index.html

          echo '</ul></body></html>' >> index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "update feed" || exit 0
          git push origin main
