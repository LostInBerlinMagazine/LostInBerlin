name: Build RSS Page

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Generate RSS HTML
        run: |
          python3 - << 'EOF'
          import requests
          import xml.etree.ElementTree as ET

          url = "https://www.lostinberlin.com/feed/"
          r = requests.get(url, timeout=20)
          r.raise_for_status()

          root = ET.fromstring(r.content)
          items = root.findall(".//item")

          html = """<!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>RSS Feed</title>
          </head>
          <body>
            <h1>Latest posts</h1>
            <ul>
          """

          for item in items:
              title = item.find("title")
              link = item.find("link")

              if title is not None and link is not None:
                  html += f'<li><a href="{link.text}" target="_blank">{title.text}</a></li>'

          html += "</ul></body></html>"

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Commit & Push safely
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add index.html

          # NON rompe mai il workflow
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "update rss"
          git push origin HEAD:main
