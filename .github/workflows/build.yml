name: Build RSS Feed Page

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python requests
        run: pip install requests

      - name: Build index.html from RSS
        run: |
          python3 - << 'EOF'
          import re
          import requests
          import time

          url = "https://www.lostinberlin.com/feed/"
          xml = requests.get(url, timeout=20).text

          items = re.findall(r"<item>(.*?)</item>", xml, re.S)

          html = """<!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>LostInBerlin</title>
          </head>
          <body>
            <h1>LostInBerlin</h1>
            <ul>
          """

          for item in items:
              title = re.search(r"<title><!\[CDATA\[(.*?)\]\]></title>", item)
              if not title:
                  title = re.search(r"<title>(.*?)</title>", item)

              link = re.search(r"<link>(.*?)</link>", item)
              img = re.search(r'src="([^"]+)"', item)

              if title and link:
                  html += "<li>"
                  if img:
                      html += f'<img src="{img.group(1)}" width="120"><br>'
                  html += f'<a href="{link.group(1)}" target="_blank">{title.group(1)}</a></li>'

          # FORZA CAMBIAMENTO SEMPRE (anti "nothing to commit")
          html += f"\n<!-- build time: {time.time()} -->\n"
          html += "</ul></body></html>"

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Commit and push (forced update)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add index.html

          # forza commit SEMPRE (anche se git non rileva diff)
          git commit -m "update feed $(date +%s)" || true

          git push origin main
