name: Build RSS Feed Page

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build index from RSS (Node)
        run: |
          node - << 'EOF'
          const https = require("https");
          const fs = require("fs");

          https.get("https://www.lostinberlin.com/feed/", (res) => {
            let data = "";

            res.on("data", chunk => data += chunk);

            res.on("end", () => {

              const items = [...data.matchAll(/<item>([\s\S]*?)<\/item>/g)];

              let html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LostInBerlin</title>
</head>
<body>
<h1>LostInBerlin</h1>
<ul>
`;

              for (const item of items) {
                const block = item[1];

                const title = (block.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/) || [])[1]
                           || (block.match(/<title>(.*?)<\/title>/) || [])[1];

                const link = (block.match(/<link>(.*?)<\/link>/) || [])[1];

                const img = (block.match(/<img[^>]*src="([^"]+)"/) || [])[1];

                html += "<li>";

                if (img) {
                  html += `<img src="${img}" width="120"><br>`;
                }

                html += `<a href="${link}" target="_blank">${title}</a></li>`;
              }

              html += "</ul></body></html>";

              fs.writeFileSync("index.html", html);
              console.log("done");
            });

          }).on("error", console.error);
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "update feed" || exit 0
          git push origin main
